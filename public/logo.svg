<svg width="176" height="72" viewBox="0 0 88 36" fill="none" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <defs>
    <!-- Cisco Blue (#0A84FF) -> Azure Blue (#38BDF8) -> Cyan (#22D3EE) -->
    <linearGradient id="ps-wave-gradient" x1="0" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A84FF" />
      <stop offset="50%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>

    <!-- Soft Blue Glow Filter -->
    <filter id="ps-blue-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#ps-blue-glow)">
    <!-- Center Horizontal Axis Line -->
    <line x1="4" y1="18" x2="84" y2="18" stroke="#38BDF8" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="2 2" />

    <!-- Left AI Network Node & Connection Line -->
    <line x1="6" y1="18" x2="16" y2="18" stroke="#0A84FF" stroke-width="1.2" stroke-opacity="0.65" stroke-dasharray="1.5 1.5" />
    <circle cx="6" cy="18" r="2.2" fill="#0A84FF" />

    <!-- Right AI Network Node & Connection Line -->
    <line x1="71" y1="18" x2="81" y2="18" stroke="#22D3EE" stroke-width="1.2" stroke-opacity="0.65" stroke-dasharray="1.5 1.5" />
    <circle cx="81" cy="18" r="2.2" fill="#22D3EE" />

    <!-- 11 Symmetrical Vertical Equalizer Bars (Centered at y=18, Expanding UP & DOWN) -->
    <rect x="16" y="15" width="3" height="6" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="21.5" y="12.5" width="3" height="11" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="27" y="10" width="3" height="16" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="32.5" y="7" width="3" height="22" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="38" y="4" width="3" height="28" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="43.5" y="1" width="3" height="34" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="49" y="4" width="3" height="28" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="54.5" y="7" width="3" height="22" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="60" y="10" width="3" height="16" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="65.5" y="12.5" width="3" height="11" rx="1.5" fill="url(#ps-wave-gradient)" />
    <rect x="71" y="15" width="3" height="6" rx="1.5" fill="url(#ps-wave-gradient)" />
  </g>
</svg>
